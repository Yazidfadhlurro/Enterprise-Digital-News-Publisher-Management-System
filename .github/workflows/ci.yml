name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_URL: http://127.0.0.1
      DB_CONNECTION: sqlite


        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate --ansi

      - name: Run tests
        run: php artisan test --no-interaction --verbose
